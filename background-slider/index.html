<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Background Slider</title>
  <link rel="stylesheet" href="style.css"/>
</head>
<body>
  <div class="slider-container">
    <div class="slide active" style="background-image: url('https://images.unsplash.com/photo-1508193638397-1c4234db14d8?w=1280')"></div>
    <div class="slide" style="background-image: url('https://images.unsplash.com/photo-1519501025264-65ba15a82390?w=1280')"></div>
    <div class="slide" style="background-image: url('https://images.unsplash.com/photo-1464822759023-fed622ff2c3b?w=1280')"></div>
    <div class="slide" style="background-image: url('https://images.unsplash.com/photo-1549880338-65ddcdfd017b?w=1280')"></div>
  </div>

  <div class="buttons">
    <button id="prev"><i>&#8592;</i></button>
    <button id="next"><i>&#8594;</i></button>
  </div>

  <script src="script.js"></script>
</body>
</html>
