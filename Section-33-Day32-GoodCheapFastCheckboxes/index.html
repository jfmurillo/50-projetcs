<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Good, Cheap, Fast</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="container">
    <h1>Good, Cheap, Fast</h1>
    <p class="subtitle">Pick any 2</p>
    <ul class="items">
      <li class="item">
        <input type="checkbox" id="good" />
        <label for="good"><div class="check-ball"></div>Good</label>
      </li>
      <li class="item">
        <input type="checkbox" id="cheap" />
        <label for="cheap"><div class="check-ball"></div>Cheap</label>
      </li>
      <li class="item">
        <input type="checkbox" id="fast" />
        <label for="fast"><div class="check-ball"></div>Fast</label>
      </li>
    </ul>
  </div>
  <script src="script.js"></script>
</body>
</html>
