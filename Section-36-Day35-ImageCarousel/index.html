<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Image Carousel</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.14.0/css/all.min.css" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="carousel-container">
    <div class="carousel">
      <img src="https://images.unsplash.com/photo-1516912481808-3406841bd33c?w=800&auto=format&fit=crop" alt="Slide 1" class="slide active" />
      <img src="https://images.unsplash.com/photo-1506905925346-21bda4d32df4?w=800&auto=format&fit=crop" alt="Slide 2" class="slide" />
      <img src="https://images.unsplash.com/photo-1501854140801-50d01698950b?w=800&auto=format&fit=crop" alt="Slide 3" class="slide" />
      <img src="https://images.unsplash.com/photo-1542401886-65d6c61db217?w=800&auto=format&fit=crop" alt="Slide 4" class="slide" />
    </div>
    <button class="btn prev-btn" id="prev"><i class="fas fa-chevron-left"></i></button>
    <button class="btn next-btn" id="next"><i class="fas fa-chevron-right"></i></button>
    <div class="dots-container" id="dots"></div>
  </div>
  <script src="script.js"></script>
</body>
</html>
