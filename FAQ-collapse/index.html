<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>FAQ Collapse</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css"/>
  <link rel="stylesheet" href="style.css"/>
</head>
<body>
  <div class="faq-container">
    <div class="faq active">
      <h3 class="faq-title">Why shouldn't you trust atoms?</h3>
      <p class="faq-text">They make up everything!</p>
      <button class="faq-toggle"><i class="fas fa-chevron-down"></i><i class="fas fa-times"></i></button>
    </div>
    <div class="faq">
      <h3 class="faq-title">What do you call a fish without eyes?</h3>
      <p class="faq-text">A fsh!</p>
      <button class="faq-toggle"><i class="fas fa-chevron-down"></i><i class="fas fa-times"></i></button>
    </div>
    <div class="faq">
      <h3 class="faq-title">How do you organize a space party?</h3>
      <p class="faq-text">You planet!</p>
      <button class="faq-toggle"><i class="fas fa-chevron-down"></i><i class="fas fa-times"></i></button>
    </div>
    <div class="faq">
      <h3 class="faq-title">Why do cows wear bells?</h3>
      <p class="faq-text">Because their horns don't work!</p>
      <button class="faq-toggle"><i class="fas fa-chevron-down"></i><i class="fas fa-times"></i></button>
    </div>
  </div>
  <script src="script.js"></script>
</body>
</html>
